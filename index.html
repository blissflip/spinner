<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>BlissFlip ¿</title>

  <style>
    :root{
      --bg-img: url("Copilot_20250819_075823.png");
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.72);
    }

    html, body { height: 100%; }

    body{
      margin:0;
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      overflow-x: hidden;
      overflow-y: auto;
      background:
        radial-gradient(1200px 600px at 50% 45%, rgba(0,0,0,.06), rgba(0,0,0,.52)),
        var(--bg-img) center/cover no-repeat;
    }

    .wrap{
      min-height: 100svh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .stage{
      text-align:center;
      max-width: 900px;
      width:100%;
    }

    .headline{
      font-size:28px;
      margin-bottom:10px;
    }

    .sub{
      font-size:14px;
      color:var(--muted);
      margin-bottom:20px;
    }

    .portal{
      width:300px;
      height:300px;
      margin:auto;
      border-radius:50%;
      display:grid;
      place-items:center;
      background: radial-gradient(circle, rgba(255,255,255,.1), rgba(0,0,0,.4));
      cursor:pointer;
    }

    .qmark{
      font-size:120px;
    }

    .bfOverlay{
      position: fixed;
      inset: 0;
      display: none;
      z-index: 99999;
      background: rgba(0,0,0,0.95);
    }

    .bfOverlay.isOpen{ display:block; }

    .bfFrame{
      width:100%;
      height:100%;
      border:0;
    }

    .whisperText{
      color:white;
      font-size:22px;
      text-align:center;
      padding:40px;
      white-space: pre-line;
    }

  </style>
</head>

<body>

<div class="wrap">
  <div class="stage">
    <div class="headline">BlissFlip ¿</div>
    <div class="sub">Tap once. Let the moment choose.</div>

    <div id="oracleTap" class="portal">
      <div class="qmark">¿</div>
    </div>
  </div>
</div>

<!-- Experience -->
<div id="bfOverlay" class="bfOverlay">
  <iframe id="bfFrame" class="bfFrame"></iframe>
</div>

<!-- Whisper -->
<div id="whisperOverlay" class="bfOverlay">
  <div id="whisperText" class="whisperText"></div>
</div>

<script>

const EXPERIENCES = [
  "https://iframe.mediadelivery.net/play/478159/39decb6a-b113-47c4-ab57-fb0085381f0b",
  "https://iframe.mediadelivery.net/play/478159/33499ff2-e71e-4522-bcbe-2206a14752ed",
  "https://iframe.mediadelivery.net/play/478159/757ad818-9626-4f0c-84ef-1aff6fcba5ad",
  "https://iframe.mediadelivery.net/play/478159/4143f333-ae29-41e8-81ea-e845a14aba95",
  "https://iframe.mediadelivery.net/play/478159/318be683-c664-41e6-8e0c-608bf3c68e5a",
  "https://iframe.mediadelivery.net/play/478159/5cbf9987-aa77-4ca3-a7c2-e4d2aaa50248"
];

const WHISPERS = [
  "What doesn’t fade\nwas never held by the body.",
  "Maybe we are already building it—\nin the way we choose to love.",
  "The tighter the grip,\nthe more slips through.",
  "That space you’re holding\nis already more than enough.",
  "Nothing missing.\nNothing required.",
  "You were never meant\nto fix everything."
];

let lastExperienceIndex = -1;
let lastWhisperIndex = -1;

function pickRandom(arr, type){
  let index;

  if (type === "experience"){
    do {
      index = Math.floor(Math.random() * arr.length);
    } while (index === lastExperienceIndex && arr.length > 1);
    lastExperienceIndex = index;
  } else {
    do {
      index = Math.floor(Math.random() * arr.length);
    } while (index === lastWhisperIndex && arr.length > 1);
    lastWhisperIndex = index;
  }

  return arr[index];
}

const oracleTap = document.getElementById("oracleTap");
const bfOverlay = document.getElementById("bfOverlay");
const bfFrame = document.getElementById("bfFrame");

const whisperOverlay = document.getElementById("whisperOverlay");
const whisperText = document.getElementById("whisperText");

function openExperience(url){
  bfFrame.src = url;
  bfOverlay.classList.add("isOpen");
}

function openWhisper(msg){
  whisperText.textContent = msg;
  whisperOverlay.classList.add("isOpen");
}

function closeAll(){
  bfOverlay.classList.remove("isOpen");
  whisperOverlay.classList.remove("isOpen");
  bfFrame.src = "";
}

bfOverlay.addEventListener("click", closeAll);
whisperOverlay.addEventListener("click", closeAll);

oracleTap.addEventListener("click", () => {

  const whisperFirst = Math.random() < 0.35;

  if (whisperFirst){
    openWhisper(pickRandom(WHISPERS, "whisper"));
    return;
  }

  openExperience(pickRandom(EXPERIENCES, "experience"));
});

</script>

</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>BlissFlip ¿</title>

  <style>
    body{
      margin:0;
      font-family: system-ui;
      background:black;
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
      text-align:center;
    }

    .portal{
      width:280px;
      height:280px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      background: radial-gradient(circle, rgba(255,255,255,.1), rgba(0,0,0,.5));
      cursor:pointer;
    }

    .qmark{
      font-size:120px;
    }

    .overlay{
      position:fixed;
      inset:0;
      display:none;
      background:black;
      z-index:9999;
    }

    .overlay.active{
      display:block;
    }

    iframe{
      width:100%;
      height:100%;
      border:0;
    }

    .whisper{
      display:flex;
      align-items:center;
      justify-content:center;
      height:100%;
      font-size:22px;
      padding:40px;
      white-space:pre-line;
    }

  </style>
</head>

<body>

<div id="tap" class="portal">
  <div class="qmark">¿</div>
</div>

<div id="videoOverlay" class="overlay">
  <iframe id="videoFrame"></iframe>
</div>

<div id="whisperOverlay" class="overlay">
  <div id="whisperText" class="whisper"></div>
</div>

<script>

const EXPERIENCES = [
  "https://iframe.mediadelivery.net/play/478159/39decb6a-b113-47c4-ab57-fb0085381f0b?autoplay=true&muted=true",
  "https://iframe.mediadelivery.net/play/478159/33499ff2-e71e-4522-bcbe-2206a14752ed?autoplay=true&muted=true",
  "https://iframe.mediadelivery.net/play/478159/757ad818-9626-4f0c-84ef-1aff6fcba5ad?autoplay=true&muted=true",
  "https://iframe.mediadelivery.net/play/478159/4143f333-ae29-41e8-81ea-e845a14aba95?autoplay=true&muted=true",
  "https://iframe.mediadelivery.net/play/478159/318be683-c664-41e6-8e0c-608bf3c68e5a?autoplay=true&muted=true",
  "https://iframe.mediadelivery.net/play/478159/5cbf9987-aa77-4ca3-a7c2-e4d2aaa50248?autoplay=true&muted=true"
];

const WHISPERS = [
  "What doesn’t fade\nwas never held by the body.",
  "Maybe we are already building it—\nin the way we choose to love.",
  "The tighter the grip,\nthe more slips through.",
  "That space you’re holding\nis already more than enough.",
  "Nothing missing.\nNothing required.",
  "You were never meant\nto fix everything."
];

let lastExperience = -1;
let lastWhisper = -1;

function pick(arr, type){
  let i;
  do{
    i = Math.floor(Math.random() * arr.length);
  } while(
    (type === "exp" && i === lastExperience && arr.length > 1) ||
    (type === "wh" && i === lastWhisper && arr.length > 1)
  );

  if(type === "exp") lastExperience = i;
  if(type === "wh") lastWhisper = i;

  return arr[i];
}

const tap = document.getElementById("tap");
const videoOverlay = document.getElementById("videoOverlay");
const videoFrame = document.getElementById("videoFrame");

const whisperOverlay = document.getElementById("whisperOverlay");
const whisperText = document.getElementById("whisperText");

function showVideo(url){
  videoFrame.src = url;
  videoOverlay.classList.add("active");
}

function showWhisper(msg){
  whisperText.textContent = msg;
  whisperOverlay.classList.add("active");
}

function closeAll(){
  videoOverlay.classList.remove("active");
  whisperOverlay.classList.remove("active");
  videoFrame.src = "";
}

videoOverlay.onclick = closeAll;
whisperOverlay.onclick = closeAll;

tap.onclick = () => {

  if(Math.random() < 0.35){
    showWhisper(pick(WHISPERS, "wh"));
    return;
  }

  showVideo(pick(EXPERIENCES, "exp"));
};

</script>

</body>
</html>
